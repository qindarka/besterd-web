<?xml version="1.0" encoding="UTF-8"?>
<!-- Vectorized Besterd Mechanical logo
     Faithful recreation: metallic 3D "BESTERD" text, "MECHANICAL" below,
     brushed-steel swoosh arc, red Canadian maple leaf top-right. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 155"
     role="img" aria-label="Besterd Mechanical">
  <defs>
    <!-- Chrome / metallic gradient for main text -->
    <linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"    stop-color="#f8f8f8"/>
      <stop offset="0.28" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d0d0d0"/>
      <stop offset="0.82" stop-color="#909090"/>
      <stop offset="1"    stop-color="#5a5a5a"/>
    </linearGradient>
    <!-- Brushed-steel gradient for swoosh -->
    <linearGradient id="swoosh" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0"   stop-color="#3a3a3a"/>
      <stop offset="0.3" stop-color="#7a7a7a"/>
      <stop offset="0.6" stop-color="#c0c0c0"/>
      <stop offset="1"   stop-color="#888888"/>
    </linearGradient>
    <!-- Bevel highlight for 3D edge -->
    <linearGradient id="bevel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Swoosh arc (brushed steel, behind text) ── -->
  <!-- Thick arc sweeping from lower-left up and around lower portion of BESTERD -->
  <path d="M -10,148 C 20,90 65,22 175,55 S 295,100 360,88"
        fill="none" stroke="url(#swoosh)" stroke-width="38"
        stroke-linecap="round" opacity="0.72"/>
  <!-- Highlight streak along top edge of swoosh -->
  <path d="M -10,148 C 20,90 65,22 175,55 S 295,100 360,88"
        fill="none" stroke="#e8e8e8" stroke-width="3"
        stroke-linecap="round" opacity="0.35"/>

  <!-- ── BESTERD — depth shadow layer (offset 3 px down-right) ── -->
  <text x="19" y="90"
        font-family="Impact,'Arial Black','Franklin Gothic Heavy',sans-serif"
        font-size="82" letter-spacing="1"
        fill="#111111" opacity="0.55">BESTERD</text>

  <!-- ── BESTERD — mid-tone layer (1 px offset) ── -->
  <text x="17" y="88"
        font-family="Impact,'Arial Black','Franklin Gothic Heavy',sans-serif"
        font-size="82" letter-spacing="1"
        fill="#444444">BESTERD</text>

  <!-- ── BESTERD — main chrome layer ── -->
  <text x="15" y="86"
        font-family="Impact,'Arial Black','Franklin Gothic Heavy',sans-serif"
        font-size="82" letter-spacing="1"
        fill="url(#chrome)"
        stroke="#0d0d0d" stroke-width="1.5"
        paint-order="stroke fill">BESTERD</text>

  <!-- ── Bevel highlight (top-of-letter edge glow) ── -->
  <text x="15" y="86"
        font-family="Impact,'Arial Black','Franklin Gothic Heavy',sans-serif"
        font-size="82" letter-spacing="1"
        fill="url(#bevel)" opacity="0.5">BESTERD</text>

  <!-- ── MECHANICAL ── -->
  <text x="26" y="120"
        font-family="Impact,'Arial Black','Franklin Gothic Heavy',sans-serif"
        font-size="28" letter-spacing="7.5"
        fill="#0d0d0d">MECHANICAL</text>

  <!-- ── Canadian Maple Leaf (upper-right, above the D) ── -->
  <!-- ~32 × 34 px leaf, positioned at top-right -->
  <g transform="translate(300, 3)">
    <!-- leaf body -->
    <path d="M 16,1
             C 16,1 15,5  14,6
             C 12,6  9,5   8,5
             C 8,5  10,8  11,9
             C 9,9   5,9   4,10
             C 4,10  8,13  9,14
             C 7,14  4,15  3,16
             C 3,16  7,16  8,17
             C 6,18  5,20  5,21
             C 5,21  8,20  9,20
             L 9,26
             L 14,26
             L 14,33
             L 16,33
             L 18,33
             L 18,26
             L 23,26
             L 23,20
             C 24,20  27,21  27,21
             C 27,20  26,18  24,17
             C 25,16  29,16  29,16
             C 28,15  25,14  23,14
             C 24,13  28,10  28,10
             C 27,9  23,9  21,9
             C 22,8  24,5  24,5
             C 23,5  20,6  18,6
             C 17,5  16,1  16,1 Z"
          fill="#cc0000" stroke="#991111" stroke-width="0.8"/>
    <!-- stem -->
    <rect x="14.5" y="31" width="3" height="7" rx="1" fill="#cc0000"/>
  </g>
</svg>
