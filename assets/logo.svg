<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Besterd Mechanical — Est. 1961">
  <defs>
    <linearGradient id="bm-plate" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"  stop-color="#f7ebcd"/>
      <stop offset="1"  stop-color="#d9c48a"/>
    </linearGradient>
    <linearGradient id="bm-ring" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"  stop-color="#2e241c"/>
      <stop offset="1"  stop-color="#100b07"/>
    </linearGradient>
    <linearGradient id="bm-wrench" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e6e6ea"/>
      <stop offset=".5" stop-color="#a9a9ae"/>
      <stop offset="1" stop-color="#5e5e63"/>
    </linearGradient>
    <linearGradient id="bm-pipe" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c7c7cc"/>
      <stop offset="1" stop-color="#6a6a70"/>
    </linearGradient>
    <path id="bm-top-arc"    d="M 32,110 A 78,78 0 0 1 188,110" fill="none"/>
    <path id="bm-bottom-arc" d="M 38,118 A 72,72 0 0 0 182,118" fill="none"/>
  </defs>

  <circle cx="112" cy="112" r="96" fill="rgba(0,0,0,.22)"/>

  <circle cx="110" cy="110" r="94" fill="url(#bm-ring)"/>
  <circle cx="110" cy="110" r="94" fill="none" stroke="#f2c72e" stroke-width="2" stroke-dasharray="2 4"/>

  <circle cx="110" cy="110" r="82" fill="url(#bm-plate)" stroke="#2e241c" stroke-width="3"/>
  <circle cx="110" cy="110" r="73" fill="none" stroke="#2e241c" stroke-width="1.5" stroke-dasharray="5 4"/>

  <text font-family="Impact, 'Arial Black', sans-serif" font-size="20" letter-spacing="5"
        fill="#2e241c" text-anchor="middle">
    <textPath href="#bm-top-arc" startOffset="50%">BESTERD MECHANICAL</textPath>
  </text>

  <text font-family="ui-monospace, 'Courier New', monospace" font-size="10" letter-spacing="3"
        fill="#6b2212" text-anchor="middle">
    <textPath href="#bm-bottom-arc" startOffset="50%">LONDON &#8226; ONTARIO &#8226; EST. 1961</textPath>
  </text>

  <g transform="translate(110 118)">
    <rect x="-54" y="16" width="108" height="8" rx="2" fill="#2e241c"/>

    <g transform="rotate(-28)">
      <rect x="-4" y="-36" width="8" height="58" fill="url(#bm-pipe)" stroke="#2e241c" stroke-width="1.5"/>
      <rect x="-7" y="-38" width="14" height="5" fill="#8a8a8f" stroke="#2e241c" stroke-width="1.5"/>
      <rect x="-7" y="18"  width="14" height="5" fill="#8a8a8f" stroke="#2e241c" stroke-width="1.5"/>
    </g>

    <g transform="rotate(32)">
      <path d="M -20,-46 L -10,-58 L 14,-58 L 22,-46 L 22,-34 L 10,-34 L 10,-24 L 22,-24 L 22,10
               L 12,16 L 12,26 L -12,26 L -12,16 L -22,10 Z"
            fill="url(#bm-wrench)" stroke="#2e241c" stroke-width="2" stroke-linejoin="round"/>
      <rect x="-8" y="-50" width="16" height="8" fill="#2e241c"/>
      <circle cx="0" cy="-14" r="3.5" fill="#2e241c"/>
      <rect x="-12" y="-4" width="24" height="3" fill="#2e241c" opacity=".55"/>
    </g>
  </g>

  <g fill="#6b2212">
    <circle cx="22"  cy="110" r="4"/>
    <circle cx="198" cy="110" r="4"/>
    <circle cx="110" cy="22"  r="4"/>
    <circle cx="110" cy="198" r="4"/>
  </g>
</svg>
